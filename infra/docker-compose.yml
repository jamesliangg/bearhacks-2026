version: "3.9"

x-common-env: &common-env
  USE_SNOWFLAKE: "false"
  LOCAL_SQLITE_PATH: /app/data/via_delays.sqlite
  MODEL_DIR: /app/models
  ACTIVE_MODEL_FILE: active.joblib

services:
  ingestion:
    build:
      context: ..
      dockerfile: services/ingestion/Dockerfile
    environment:
      <<: *common-env
    volumes:
      - via-data:/app/data
      - via-models:/app/models
    ports:
      - "8001:8000"

  training:
    build:
      context: ..
      dockerfile: services/training/Dockerfile
    environment:
      <<: *common-env
    volumes:
      - via-data:/app/data
      - via-models:/app/models
    ports:
      - "8002:8000"

  prediction:
    build:
      context: ..
      dockerfile: services/prediction/Dockerfile
    environment:
      <<: *common-env
    volumes:
      - via-data:/app/data
      - via-models:/app/models
    ports:
      - "8003:8000"

volumes:
  via-data:
  via-models:
